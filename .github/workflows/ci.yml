name: CI

on:
  push:
    branches: [main, future]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sqlive-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: sqlive-backend
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/future' }}
      - run: gradle test

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: sqlive-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: sqlive-frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: sqlive-frontend
        run: npm run test

  e2e:
    runs-on: ubuntu-latest
    needs: frontend-test
    env:
      BACKEND_BOOT_CMD: gradle bootRun
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: sqlive-backend
          cache-read-only: true

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: sqlive-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: sqlive-frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('sqlive-frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        working-directory: sqlive-frontend
        run: npx playwright install --with-deps chromium

      - name: Ensure gradlew is executable
        run: chmod +x sqlive-backend/gradlew

      - name: Start backend
        working-directory: sqlive-backend
        run: |
          gradle bootRun &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV

      - name: Start frontend
        working-directory: sqlive-frontend
        run: |
          npm run dev &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8080/actuator/health && break
            sleep 2
          done
          for i in $(seq 1 30); do
            curl -s http://localhost:5173 && break
            sleep 2
          done

      - name: Run E2E tests
        working-directory: sqlive-frontend
        run: npx playwright test --config tests/e2e/playwright.config.ts --project=chromium --workers=4

      - name: Stop services
        if: always()
        run: |
          kill $FRONTEND_PID 2>/dev/null || true
          kill $BACKEND_PID 2>/dev/null || true
